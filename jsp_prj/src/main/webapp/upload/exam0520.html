<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<form>
		<table cellspacing="0">
			<tr>
				<td colspan="5" align="center"><strong><font size="20">회원가입</font></strong></td>
			</tr>
			<tr height="60">
				<td width="100" bgcolor="#F9F8F8"><label for="id">아이디</label></td>
				<td width="200"><input type="text" id="id" readonly="readonly"></td>
				<td colspan="3"><input type="button" value="ID 중복확인"></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="password1">비밀번호</label></td>
				<td><input type="password" id="password1"></td>
				<td width="150"><label for="password2">비밀번호 확인</label></td>
				<td width="200"><input type="password" id="password2"></td>
				<td width="400">*6~12자의 영문,숫자,특수문자3가지를 조합하여 입력</td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="name">이름</label></td>
				<td colspan="4"><input type="text" id="name"></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="birth">생일</label></td>
				<td colspan="4"><input type="date" id="birth"></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="tel">연락처</label></td>
				<td colspan="4"><input type="tel" id="tel"></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="phone">휴대폰</label></td>
				<td><input type="tel" id="phone"></td>
				<td colspan="3"><input type="checkbox">수신</td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="emailid">이메일</label></td>
				<td><input type="email" id="emailid"> @</td>
				<td colspan="3"><input type="email" list="emaillist" placeholder="직접입력"><datalist id="emaillist">
						<option value="google.com">
						<option value="naver.com">
						<option value="daum.net">
						<option value="nate.com">
					</datalist></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8"><label for="gender">성별</label></td>
				<td colspan="4">
				<input type="radio" name="gender" id="gender" checked="checked">남자
				<input type="radio" name="gender">여자</td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8">소재지</td>
				<td colspan="4"><select>
					<option selected="selected">선택해주세요</option>
					<option>강원</option>
					<option>경기</option>
					<option>경남</option>
					<option>경북</option>
					<option>광주</option>
					<option>대구</option>
					<option>대전</option>
					<option>부산</option>
					<option>서울</option>
					<option>울산</option>
					<option>인천</option>
					<option>전남</option>
					<option>전북</option>
					<option>제주</option>
					<option>충남</option>
					<option>충북</option>
					<option>해외</option>
				</select></td>
			</tr>
			<tr height="60">
				<td bgcolor="#F9F8F8">우편번호</td>
				<td><input type="text"></td>
				<td colspan="3"><input type="button" value="우편번호검색"></td>
			</tr>
			<tr height="40">
				<td rowspan="2" bgcolor="#F9F8F8">주소</td>
				<td colspan="4"><input type="text" readonly="readonly" size="60"></td>
			</tr>
			<tr height="40">
				<td colspan="4"><input type="text" size="60"></td>
			</tr>
		</table>
		<table>
			<tr height="1"></tr>
			<tr height="100">
				<td width="425"></td>
				<td width="100" align="right"><input type="button" value="확인"></td>
				<td width="100" align="left"><input type="reset" value="취소"></td>
				<td width="425"></td>
			</tr>
		</table>
	</form>
</body>
</html>
